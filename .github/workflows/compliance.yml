name: Security & Compliance Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Dependency Vulnerability Scan
      run: npm audit --audit-level=high

    - name: Run TypeScript Type Check
      run: npx tsc --noEmit

    - name: Execute Security & Core Unit Tests
      run: |
        npx tsx --test src/core/security/*.test.ts
        npx tsx --test src/core/agents/*.test.ts
        npx tsx --test src/core/bus/*.test.ts
        npx tsx --test src/core/registry/*.test.ts
        npx tsx --test src/core/workflow/*.test.ts
        npx tsx --test src/core/semantic/*.test.ts

    - name: Dashboard Build Check
      working-directory: ./dashboard
      run: |
        npm ci
        npx next build
